<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashtiss Site | Lightning Plugin</title>
    <style>
        /* Add your CSS styling for the navigation bar here */
        /* Styling for the ordered list */
        .cool-ordered-list {
            list-style-type: decimal; /* Use decimal numbering (1, 2, 3, ...) */
            font-size: 20px;
            color: #3498db; /* Blue color */
        }

        /* Styling for the unordered list */
        .cool-unordered-list {
            list-style-type: none; /* Remove the default bullet points */
            padding-left: 0; /* Remove left padding */
        }

            .cool-unordered-list li::before {
                content: "\2022"; /* Unicode bullet character (Ģ) */
                color: #e74c3c; /* Red color for bullets */
                font-size: 24px;
                margin-right: 10px; /* Space between bullet and text */
            }
        #navbar {
            background-color: #333;
            overflow: hidden;
        }

            #navbar a {
                float: left;
                display: block;
                color: white;
                text-align: center;
                padding: 14px 16px;
                text-decoration: none;
            }

                #navbar a:hover {
                    background-color: #ddd;
                    color: black;
                }

        /* Add more CSS for styling as needed */
    </style>
</head>
<body>
    <div id="navbar">
        <a href="../index.html">Home</a>
    </div>
    <div class="container">
        <div class="container">
            <h2>Lightning Plugin</h2>
       
            <p>
                This plugin is for the Lightning-SL SCP SL server. It has many features listed below
            </p>
            <ul class="cool-unordered-list">
                <li>Tells if RoundLock is on and notifies admins</li>
            </ul>
            <h1>
                Planed Features
            </h1>
            <ul class="cool-unordered-list">
                <li>AntiSurfaceCamping built into it</li>
                <li>AntiZombie Suicide</li>
                <li>Chaos Announcement built into it</li>
            </ul>
    </div>

    <script>
        // JavaScript code to dynamically update the navigation bar
        function updateNavbar() {
            const container = document.querySelector('.container');
            const navbar = document.getElementById('navbar');

            // Clear existing navigation links
            navbar.innerHTML = '<a href="../index.html">Home</a>';

            // Fetch all folders and HTML files within the container
            const items = Array.from(container.children);

            items.forEach(item => {
                if (item.tagName === 'A' && item.href) {
                    // Create a new link in the navigation bar for each HTML file
                    navbar.innerHTML += `<a href="${item.href}">${item.textContent}</a>`;
                }
            });
        }

        // Call the function to initially set up the navigation bar
        updateNavbar();
    </script>
</body>
</html>
