<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashtiss Site</title>
    <style>
        /* Add your CSS styling for the navigation bar here */
        #navbar {
            background-color: #333;
            overflow: hidden;
        }

            #navbar a {
                float: left;
                display: block;
                color: white;
                text-align: center;
                padding: 14px 16px;
                text-decoration: none;
            }

                #navbar a:hover {
                    background-color: #ddd;
                    color: black;
                }

        /* Add more CSS for styling as needed */
    </style>
</head>
<body>
    <div id="navbar">
        <a href="index.html">Home</a>
    </div>
    <div class="container">
        <!-- Content for individual plugin pages will be loaded here -->
    </div>

    <script>
        // JavaScript code to dynamically update the navigation bar
        function updateNavbar() {
            const container = document.querySelector('.container');
            const navbar = document.getElementById('navbar');

            // Clear existing navigation links
            navbar.innerHTML = '<a href="index.html">Home</a>';

            // Fetch all folders and HTML files within the container
            const items = Array.from(container.children);

            items.forEach(item => {
                if (item.tagName === 'A' && item.href) {
                    // Create a new link in the navigation bar for each HTML file
                    navbar.innerHTML += `<a href="${item.href}">${item.textContent}</a>`;
                }
            });
        }

        // Call the function to initially set up the navigation bar
        updateNavbar();
    </script>
</body>
</html>
